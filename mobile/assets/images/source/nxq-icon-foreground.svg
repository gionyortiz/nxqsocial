  <polygon points="60,22 94,41 94,79 60,98 26,79 26,41" fill="none" stroke="url(#glow)" stroke-width="3.2"/>
  <polygon points="60,33 85,47.5 85,72.5 60,87 35,72.5 35,47.5" fill="url(#cavity)" stroke="url(#glow)" stroke-width="2"/>
  <polygon points="60,41 78,51.5 78,68.5 60,79 42,68.5 42,51.5" fill="none" stroke="#38bdf8" stroke-width="1.6" opacity="0.8"/>
  <circle cx="60" cy="60" r="20" fill="#22d3ee" opacity="0.35" filter="url(#soft)"/>
  <circle cx="60" cy="60" r="13.5" fill="url(#core)"/>
