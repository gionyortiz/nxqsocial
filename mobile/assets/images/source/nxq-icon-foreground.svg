      <stop offset="0.6" stop-color="#4a566b"/>
      <stop offset="1" stop-color="#2b3445"/>
    </linearGradient>
    <linearGradient id="glow" x1="60" y1="22" x2="60" y2="98" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#a5f3fc"/>
      <stop offset="0.5" stop-color="#22d3ee"/>
